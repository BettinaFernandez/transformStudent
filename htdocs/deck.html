
<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
		<meta name="description" content="Sample Code to implement transform and transition">
    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			* {
				box-sizing: border-box;
			}

			div {
				transition: all 0.5s ease-in-out;
				
			}
			#deck{
				position: relative;
				width: 50vw;
				height: 75vh;
				margin: 0 auto 110px;
				border: 3px solid black;
				padding: 40px;
			}
			#deck div{
				position: absolute;
				left: 300px;
				top: 175px;
				border: 3px solid black;
				height: 30vh;
				width: 20vw;
				background-color: white;
				color: red;
				font-size: 2em;
				padding: 5px;
				font-weight: bold;

			}
			#deck:hover div{
				border: 3px solid yellow;
				transform-origin: bottom left;

			}
			#deck:hover div:first-child{
				background-color: yellow;

				transform: rotate(-35deg);/* Standard syntax */
				z-index: 1;
				transition: all 0.5s ease-in-out
		
			}
			#deck:hover div:nth-child(2){
				background-color: orange;
				transform: rotate(-25deg);/* Standard syntax */
				z-index: 2;
				transition: all 0.5s ease-in-out
			}
			#deck:hover div:nth-child(3){
				background-color: green;
				transform: rotate(-15deg);/* Standard syntax */
				z-index: 3;
				transition: all 0.5s ease-in-out
			}
			#deck:hover div:nth-child(4){
				background-color: blue;
				z-index: 4;
			}
			#deck:hover div:nth-child(5){
				background-color: violet;
				transform: rotate(15deg);
				z-index: 5;
				transition: all 0.5s ease-in-out
			}
			a {
				text-decoration: none;
			}
			button {
				display: block;
				width: 25vw;
				padding: 5px;
				margin: 10px auto;
			}
			.apple:hover {
				display: none;
			}
		</style>
	</head>
	<body>
		<div id="deck">
			<div >🦑</div>
			<div > 🤷</div>
			<div >	🍁</div>
			<div >	😊</div>
      <div > 🤰</div>
		</div>
    <a href=""><button class="apple"> Click me for Home</button> </a>
	</body>
</html>
